<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Awaaz</title>
</head>

<body>

    <!-- Navbar -->
     <header>
    <nav class="navbar">
        <div class="logo">
            <img src="logo.jpeg" alt="Awaaz Logo">
            
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
            
        </div>
    </nav>
</header>

    <!-- Hero Section-->
     <section class="hero">
        <div class="hero-content">
            <h1>Amplifying Voices That Matter</h1>

            <p>Stories | Opinions | Real Talk
                <br>
                By the Youth,For the Youth
            </p>
            <a href="#stories" class="btn">
                Explore Stories
            </a>
        </div>
     </section>
    
     <!--About-->
     <section class="about">
        <h2>About Awaaz 4X</h2>
        <p>Awaaz 4X is a youth-driven digital media platform
        focused on stories, opinions, current affairs,
        and conversations that shape society</p>
     </section>

     <!--Contact-->
     <section class="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text"
            placeholder="Name">
            <input type="email"
            placeholder="Email">
            <textarea placeholder="Message"></textarea>
            
            <button type="submit">
                Send Message
            </button>

        </form>
     </section>
    </body>
    <script src="script.js"></script>
</html>
